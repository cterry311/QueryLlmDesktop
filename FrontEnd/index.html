<!DOCTYPE html>
<html>
    <head>
        <title>Query</title>
        <link rel="stylesheet" href="style.css">
        <script src="node_modules/marked/lib/marked.umd.js"></script>
        <script src="view.js" defer></script>
    </head>
    <body>
        <header class="topbar">
            <h1 class="title">Query</h1>
            <select id="model-select" class="model-select" title="Model">
                <option value="openrouter/free">openrouter/free (default)</option>
            </select>
            <button id="settings-btn" class="settings-btn" title="Settings">&#9881;</button>
        </header>

        <main id="messages" class="messages"></main>

        <form id="composer" class="composer">
            <textarea
                id="input"
                class="input"
                placeholder="Type a message... (Enter to send, Shift+Enter for newline)"
                rows="2"></textarea>
            <button id="send-btn" type="submit" class="send-btn">Send</button>
        </form>

        <div id="settings-modal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header"><button id="settings-back" class="back-btn hidden" title="Back">&larr;</button>
                    <h2 id="settings-title">Settings</h2>
                    <button id="settings-close" class="close-btn" title="Close">&times;</button>
                </div>

                <ul id="settings-list" class="settings-list">
                    <li><button data-setting="api">API Details</button></li>
                    <li><button data-setting="theme">Appearance / theme</button></li>
                    <li><button data-setting="clear">Clear conversation</button></li>
                    <li><button data-setting="about">About</button></li>
                </ul>

                <div id="api-details-view" class="api-details hidden">
                    <div id="api-pairs" class="api-pairs"></div>
                    <button id="api-add-pair" class="api-add-pair" type="button">+ Add URL / Key pair</button>
                    <div class="api-actions">
                        <button id="api-save" class="api-save" type="button">Save</button>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
